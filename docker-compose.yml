version: '3.8'

services:
  clone-hero-server:
    build: 
      context: .
      tags:
        - clonehero-standalone-server:latest
        - clonehero-standalone-server:1.0.0.4080
    image: vloschiavo/clonehero-standalone-server
    container_name: clone-hero-server
    restart: unless-stopped
    user: "1000:1000"
    
    ports:
      - "14242:14242/udp"
    
    volumes:
      - ./server-settings.ini:/usr/src/clonehero/config/server-settings.ini

    # Optional: Give the container a bit more resources if you expect many players
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
